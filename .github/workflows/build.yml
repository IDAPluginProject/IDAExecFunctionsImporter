name: Build IDA plugin

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: IDA ${{ matrix.ida_version }}
    runs-on: windows-2025

    strategy:
      fail-fast: false
      matrix:
        include:
          - ida_version: "9.2"
            sdk_ref: v9.2.0-sdk.1
          - ida_version: "9.3"
            sdk_ref: v9.3.1-release
          - ida_version: "9.4"
            sdk_ref: v9.4.0-release

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check out IDA ${{ matrix.ida_version }} SDK
        uses: actions/checkout@v4
        with:
          repository: HexRaysSA/ida-sdk
          ref: ${{ matrix.sdk_ref }}
          path: ida-sdk-${{ matrix.ida_version }}
          submodules: recursive

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build release plugin
        shell: pwsh
        run: |
          $OutputDirectory = Join-Path $env:RUNNER_TEMP "plugin-${{ matrix.ida_version }}"
          New-Item -ItemType Directory -Force -Path $OutputDirectory | Out-Null

          $Arguments = @(
            "IDAExecFunctions64.sln"
            "/m"
            "/p:Configuration=Release"
            "/p:Platform=x64"
            "/p:PlatformToolset=v143"
            "/p:IDASDKPath=${{ github.workspace }}\ida-sdk-${{ matrix.ida_version }}\src"
            "/p:OutDir=$OutputDirectory\"
          )

          & msbuild @Arguments

          if ($LASTEXITCODE -ne 0) {
            throw "MSBuild failed with exit code $LASTEXITCODE."
          }

      - name: Package plugin
        shell: pwsh
        run: |
          $InputDirectory = Join-Path $env:RUNNER_TEMP "plugin-${{ matrix.ida_version }}"
          $PackageDirectory = Join-Path $env:RUNNER_TEMP "packages"
          $PackageName = "IDAExecFunctionsImporter-ida-${{ matrix.ida_version }}-windows-x64.zip"
          $PackagePath = Join-Path $PackageDirectory $PackageName

          New-Item -ItemType Directory -Force -Path $PackageDirectory | Out-Null

          $Files = Get-ChildItem -Path $InputDirectory -File |
            Where-Object { $_.Extension -in ".dll", ".pdb" }

          if (-not $Files) {
            throw "No plugin files were produced."
          }

          Compress-Archive `
            -Path $Files.FullName `
            -DestinationPath $PackagePath `
            -Force

      - name: Upload plugin
        uses: actions/upload-artifact@v4
        with:
          name: IDAExecFunctionsImporter-ida-${{ matrix.ida_version }}-windows-x64
          path: ${{ runner.temp }}/packages/*.zip
          if-no-files-found: error

  release:
    name: Create release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "release-artifacts/*.zip"
          artifactErrorsFailBuild: true
          generateReleaseNotes: true
