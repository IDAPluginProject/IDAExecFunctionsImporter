name: Build IDA plugin

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: IDA ${{ matrix.ida_version }}
    runs-on: windows-2025

    strategy:
      fail-fast: false
      matrix:
        include:
          - ida_version: "9.2"
            sdk_ref: v9.2.0-sdk.1
          - ida_version: "9.3"
            sdk_ref: v9.3.1-release
          - ida_version: "9.4"
            # Pin this to the v9.4.x-release tag once Hex-Rays publishes it.
            sdk_ref: main

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check out IDA ${{ matrix.ida_version }} SDK
        uses: actions/checkout@v4
        with:
          repository: HexRaysSA/ida-sdk
          ref: ${{ matrix.sdk_ref }}
          path: ida-sdk-${{ matrix.ida_version }}
          submodules: recursive

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build release plugin
        shell: pwsh
        run: |
          $OutputDirectory = Join-Path $env:RUNNER_TEMP "plugin-${{ matrix.ida_version }}"
          New-Item -ItemType Directory -Force -Path $OutputDirectory | Out-Null

          $Arguments = @(
            "IDAExecFunctions64.sln"
            "/m"
            "/p:Configuration=Release"
            "/p:Platform=x64"
            "/p:PlatformToolset=v143"
            "/p:IDASDKPath=${{ github.workspace }}\ida-sdk-${{ matrix.ida_version }}\src"
            "/p:OutDir=$OutputDirectory\"
          )
          & msbuild @Arguments
          if ($LASTEXITCODE -ne 0) {
            throw "MSBuild failed with exit code $LASTEXITCODE."
          }

      - name: Upload plugin
        uses: actions/upload-artifact@v4
        with:
          name: IDAExecFunctionsImporter-ida-${{ matrix.ida_version }}-windows-x64
          path: |
            ${{ runner.temp }}/plugin-${{ matrix.ida_version }}/*.dll
            ${{ runner.temp }}/plugin-${{ matrix.ida_version }}/*.pdb
          if-no-files-found: error
